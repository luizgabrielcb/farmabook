services:
  postgres:
    image: postgres:17-alpine
    container_name: farmaorder-postgres
    environment:
      POSTGRES_DB: ${ENV_POSTGRES_DB:-farmaorder_db}
      POSTGRES_USER: ${ENV_POSTGRES_USER:-farmaorder_user}
      POSTGRES_PASSWORD: ${ENV_POSTGRES_PASSWORD:-farmaorder_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

