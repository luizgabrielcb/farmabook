services:
  postgres:
    image: postgres:17-alpine
    container_name: farmabook-postgres
    environment:
      POSTGRES_DB: ${ENV_POSTGRES_DB:-farmabook}
      POSTGRES_USER: ${ENV_POSTGRES_USER:-farmabook_user}
      POSTGRES_PASSWORD: ${ENV_POSTGRES_PASSWORD:-farmabook_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

